# 静的サイト（web/）をビルドし GitHub Pages に公開する。
#
# 前提:
#   - リポジトリの Settings → Pages で Source を「GitHub Actions」にする
#   - Settings → Secrets and variables → Actions に以下を登録:
#       PUBLIC_EVENTS_CSV_URL … 公開 CSV の URL（web/.env と同じ値）
#
# 動き:
#   - main への push のたびにビルド・デプロイ（シート更新後に空コミット等でも可）
#   - 毎日 15:15 UTC（≈ 翌日 0:15 JST）に定期ビルド
#   - Actionsタブから「Run workflow」で手動実行も可能

name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 15 * * *"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        env:
          PUBLIC_EVENTS_CSV_URL: ${{ secrets.PUBLIC_EVENTS_CSV_URL }}
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
